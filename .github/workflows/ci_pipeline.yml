name: CI Pipeline for ML Model

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  train-and-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: pip install pandas scikit-learn mlflow==2.19.0 dagshub matplotlib seaborn virtualenv

      - name: Run MLProject Training
        env:
          MLFLOW_TRACKING_URI: https://dagshub.com/aksaex/MSML_Proyek_Akhir.mlflow
          MLFLOW_TRACKING_USERNAME: aksaex
          MLFLOW_TRACKING_PASSWORD: ${{ secrets.DAGSHUB_TOKEN }}
          DAGSHUB_USER_TOKEN: ${{ secrets.DAGSHUB_TOKEN }}
        run: |
          cd MLProject
          mlflow run . --env-manager=local

      - name: Upload Artifacts to GitHub
        uses: actions/upload-artifact@v4
        with:
          name: ml-artifacts
          path: MLProject/

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and Push Docker Image (Manual Override)
        run: |
          cd MLProject
          echo "Membangun Docker image secara manual menghindari bug MLflow..."
          
          # Build manual menggunakan Dockerfile yang baru kita buat
          docker build -t ${{ secrets.DOCKER_USERNAME }}/msml-model:latest .
          
          # Push ke Docker Hub
          docker push ${{ secrets.DOCKER_USERNAME }}/msml-model:latest
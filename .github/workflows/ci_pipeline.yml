name: CI Pipeline for ML Model

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  train-and-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install MLflow & Dependencies
        run: pip install mlflow==2.19.0 dagshub pandas scikit-learn matplotlib seaborn virtualenv

      - name: Run MLProject Training
        env:
          MLFLOW_TRACKING_URI: https://dagshub.com/aksaex/MSML_Proyek_Akhir.mlflow
          MLFLOW_TRACKING_USERNAME: aksaex
          MLFLOW_TRACKING_PASSWORD: ${{ secrets.DAGSHUB_TOKEN }}
          DAGSHUB_USER_TOKEN: ${{ secrets.DAGSHUB_TOKEN }}
        run: |
          cd MLProject
          mlflow run . --env-manager=local

      - name: Get Latest Run ID
        id: get_run_id
        env:
          MLFLOW_TRACKING_URI: https://dagshub.com/aksaex/MSML_Proyek_Akhir.mlflow
          MLFLOW_TRACKING_USERNAME: aksaex
          MLFLOW_TRACKING_PASSWORD: ${{ secrets.DAGSHUB_TOKEN }}
        run: |
          RUN_ID=$(python -c "from mlflow.tracking import MlflowClient; client = MlflowClient(); runs = client.search_runs(experiment_ids=['0'], order_by=['start_time DESC'], max_results=1); print(runs[0].info.run_id)")
          echo "RUN_ID=$RUN_ID" >> $GITHUB_ENV
          echo "Berhasil mendapatkan Run ID: $RUN_ID"

      - name: Download Model Artifact
        env:
          MLFLOW_TRACKING_URI: https://dagshub.com/aksaex/MSML_Proyek_Akhir.mlflow
          MLFLOW_TRACKING_USERNAME: aksaex
          MLFLOW_TRACKING_PASSWORD: ${{ secrets.DAGSHUB_TOKEN }}
        run: |
          mlflow artifacts download -u "runs:/${{ env.RUN_ID }}/random_forest_model" -d model_artifact

      - name: Upload Artifact to GitHub
        uses: actions/upload-artifact@v4
        with:
          name: model-artifact
          path: model_artifact/

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and Push Docker Image
        env:
          MLFLOW_TRACKING_URI: https://dagshub.com/aksaex/MSML_Proyek_Akhir.mlflow
          MLFLOW_TRACKING_USERNAME: aksaex
          MLFLOW_TRACKING_PASSWORD: ${{ secrets.DAGSHUB_TOKEN }}
          DOCKER_USER: ${{ secrets.DOCKER_USERNAME }}
        run: |
          echo "Membangun Docker image untuk Run ID: ${{ env.RUN_ID }}"
          
          # --- INI DIA KODE SAKTINYA ---
          # Kita gunakan Python API untuk memaksa base image ke python:3.10-slim
          cat << 'EOF' > build_docker_custom.py
          import os
          
          # Mencoba memanggil fungsi build_docker dari modul yang tepat
          try:
              from mlflow.models import build_docker
          except ImportError:
              from mlflow.models.python_api import build_docker

          run_id = os.environ.get("RUN_ID")
          docker_user = os.environ.get("DOCKER_USER")
          
          model_uri = f"runs:/{run_id}/random_forest_model"
          image_name = f"{docker_user}/msml-model:latest"
          
          print(f"Menggunakan Kode Sakti: Force building Docker image {image_name} dengan base image python:3.10-slim")
          
          build_docker(
              model_uri=model_uri,
              name=image_name,
              env_manager="virtualenv",
              base_image="python:3.10-slim" # <-- Ini yang akan membunuh error get-pip!
          )
          EOF
          
          python build_docker_custom.py
          # -----------------------------
          
          # Push image ke Docker Hub
          docker push ${{ secrets.DOCKER_USERNAME }}/msml-model:latest
name: CI Pipeline for ML Model

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  train-and-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install MLflow & Dependencies
        # Menginstal semua library yang dibutuhkan secara langsung
        run: pip install mlflow==2.19.0 dagshub pandas scikit-learn matplotlib seaborn virtualenv

      - name: Run MLProject Training
        env:
          MLFLOW_TRACKING_URI: https://dagshub.com/aksaex/MSML_Proyek_Akhir.mlflow
          MLFLOW_TRACKING_USERNAME: aksaex
          MLFLOW_TRACKING_PASSWORD: ${{ secrets.DAGSHUB_TOKEN }}
          # Menambahkan Token DagsHub agar skrip python tidak meminta login manual
          DAGSHUB_USER_TOKEN: ${{ secrets.DAGSHUB_TOKEN }}
        run: |
          cd MLProject
          # Menjalankan MLflow menggunakan env lokal (pip yang sudah diinstal di atas)
          mlflow run . --env-manager=local

      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and Push Docker Image
        env:
          MLFLOW_TRACKING_URI: https://dagshub.com/aksaex/MSML_Proyek_Akhir.mlflow
          MLFLOW_TRACKING_USERNAME: aksaex
          MLFLOW_TRACKING_PASSWORD: ${{ secrets.DAGSHUB_TOKEN }}
        run: |
          export RUN_ID=$(mlflow runs search --experiment-ids 0 --max-results 1 --output-format json | jq -r '.[0].info.run_id')
          echo "Building Docker image for Run ID: $RUN_ID"
          
          mlflow models build-docker -m "runs:/$RUN_ID/random_forest_model" -n ${{ secrets.DOCKER_USERNAME }}/msml-model:latest
          
          docker push ${{ secrets.DOCKER_USERNAME }}/msml-model:latest